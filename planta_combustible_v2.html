/* ── API HELPERS ──────────────────────────────────────────────────────────── */
async function gasPost(url,payload){
  try{ await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)}); }
  catch(e){console.warn("GAS POST error",e);}
}
async function gasGet(url){
  const res=await fetch(url+"?action=getAll&nocache="+Date.now());
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}

function rowToMov(row){
  if(!row||!row[0]) return null;
  // Sheet: col10=Factura, col11=Tk1, col12=Tk2, col13=Tk3, col18=TanqueDestino
  const fechaRaw=String(row[1]||"");
  const fecha=fechaRaw.includes("T")?fechaRaw.slice(0,10):fechaRaw;
  return {id:String(row[0]),fecha,ref:String(row[2]||""),comp:String(row[3]||""),pedido:String(row[4]||""),proveedor:String(row[5]||""),receptor:String(row[6]||""),destino:String(row[7]||""),interno:String(row[8]||""),chofer:String(row[9]||""),factura:String(row[10]||""),tk1:String(row[11]||""),tk2:String(row[12]||""),tk3:String(row[13]||""),tanqueDestino:String(row[18]||"")};
}

function rowToMovCR(row, idx){
  if(!row||!row[0]) return null;
  // Sheet Base CR: A=Fecha, B=Interno, C=Patente, D=Chofer, E=Litros, F=Producto, G=Observaciones
  const fechaRaw=String(row[0]||"");
  const fecha=fechaRaw.includes("T")?fechaRaw.slice(0,10):fechaRaw;
  const litros=String(row[4]||"");
  return {id:"cr_"+idx+"_"+fecha,fecha,interno:String(row[1]||""),patente:String(row[2]||""),chofer:String(row[3]||""),litros,producto:String(row[5]||""),observaciones:String(row[6]||"")};
}

const toDay=()=>new Date().toISOString().slice(0,10);
const TANKS=["Tk1","Tk2","Tk3"];
const TANK_LABELS={"Tk1":"Gasoil Tk1","Tk2":"Euro Tk2","Tk3":"Euro Tk3"};
const TIPOS=[{val:"RTO",label:"RTO — Remito"},{val:"FAC",label:"FAC — Factura"},{val:"PS",label:"PS  — Despacho"}];

/* ══ COMPONENTES COMUNES ══════════════════════════════════════════════════ */
const inp={background:"#faf7f2",border:"1px solid #ddd4c4",borderRadius:5,color:"#1e1610",padding:"8px 11px",fontSize:13,fontFamily:"'Barlow',sans-serif",width:"100%"};
const lbl={fontSize:10,color:"#8a7a6c",letterSpacing:1.5,marginBottom:4,display:"block",fontFamily:"'Barlow Condensed'",fontWeight:700,textTransform:"uppercase"};

function Toast({msg,type}){
  if(!msg) return null;
  const bg=type==="ok"?"#2a7a4a":type==="err"?"#c02828":"#1a5890";
  return(
    <div style={{position:"fixed",bottom:24,right:24,background:bg,color:"#fff",padding:"12px 20px",borderRadius:10,fontFamily:"'Barlow Condensed'",fontSize:14,fontWeight:700,letterSpacing:1,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",zIndex:9999,display:"flex",alignItems:"center",gap:8,maxWidth:360}}>
      {type==="loading"&&<span className="spin" style={{marginRight:4}}>⟳</span>}
      {msg}
    </div>
  );
}

function Badge({tipo}){
  const m={RTO:{bg:"#e6f2ff",c:"#1a5890",b:"#a8ccee"},FAC:{bg:"#e6f2ff",c:"#1a5890",b:"#a8ccee"},PS:{bg:"#fff0e6",c:P.accent,b:"#eebb99"}}[tipo]||{bg:P.bg2,c:P.inkL,b:P.border};
  return <span style={{background:m.bg,color:m.c,border:`1px solid ${m.b}`,fontSize:10,fontWeight:700,letterSpacing:1.5,padding:"2px 8px",borderRadius:3,fontFamily:"'Barlow Condensed'"}}>{tipo}</span>;
}

function Gauge({name,stock,cap,idx}){
  const pct=cap>0?Math.min(1,Math.max(0,(stock||0)/cap)):0;
  const r=46,circ=2*Math.PI*r;
  const color=pct>0.6?P.green:pct>0.25?P.amber:P.red;
  return(
    <div className="fu" style={{animationDelay:`${idx*0.12}s`,flex:1,minWidth:155,background:P.card,border:`1px solid ${P.border}`,borderRadius:14,padding:"18px 14px 16px",display:"flex",flexDirection:"column",alignItems:"center",boxShadow:"0 2px 14px rgba(0,0,0,.07)",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${color}cc,${color}44)`}}/>
      <div style={{fontFamily:"'Barlow Condensed'",fontSize:12,fontWeight:700,letterSpacing:3,color:P.inkL,textTransform:"uppercase",marginBottom:12}}>{TANK_LABELS[name]||name}</div>
      <div style={{position:"relative",width:108,height:108}}>
        <svg width={108} height={108} style={{transform:"rotate(-90deg)"}}>
          <circle cx={54} cy={54} r={r} fill="none" stroke={P.bg2} strokeWidth={9}/>
          <circle cx={54} cy={54} r={r} fill="none" stroke={color} strokeWidth={9} strokeLinecap="round" strokeDasharray={`${pct*circ} ${circ}`} style={{transition:"stroke-dasharray .5s ease,stroke .3s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:900,color:P.ink}}>{Math.round(pct*100)}%</div>
        </div>
      </div>
      <div style={{marginTop:10,textAlign:"center"}}>
        <div style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:700,color}}>{fmt(Math.round(stock||0))} <span style={{fontSize:11,color:P.inkL,fontWeight:400}}>L</span></div>
        <div style={{fontSize:11,color:P.inkL,marginTop:2}}>Cap: {fmt(cap)} L</div>
      </div>
    </div>
  );
}

function Stat({label,value,unit="L",color,idx=0}){
  return(
    <div className="fu" style={{animationDelay:`${idx*0.08}s`,flex:1,minWidth:130,background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"16px 18px",boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderTop:`3px solid ${color}`}}>
      <div style={{...lbl,marginBottom:6}}>{label}</div>
      <div style={{fontFamily:"'Barlow Condensed'",fontSize:28,fontWeight:900,color,lineHeight:1}}>
        {fmt(value)} <span style={{fontSize:13,fontWeight:400,color:P.inkL}}>{unit}</span>
      </div>
    </div>
  );
}

/* ══ MÓDULO PLANTA GRANEL ════════════════════════════════════════════════ */
function PlantaGranel({showToast}){
  const [caps,setCaps]=useState({Tk1:100000,Tk2:100000,Tk3:100000});
  const [listas,setListas]=useState(DEFAULT_LISTAS);
  const [editLista,setEditLista]=useState(null);
  const [initStock,setInitStock]=useState({Tk1:26000,Tk2:24000,Tk3:8100});
  const [movs,setMovs]=useState([]);
  const [tab,setTab]=useState("movs");
  const [fMes,setFMes]=useState("");
  const [fTipo,setFTipo]=useState("");
  const [fQ,setFQ]=useState("");
  const [editId,setEditId]=useState(null);
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>{
    setSyncing(true);
    Promise.all([
      fetch(GAS_URL_PLANTA+"?action=getAll&nocache="+Date.now()).then(r=>r.json()),
      fetch(GAS_URL_PLANTA+"?action=getRow2&nocache="+Date.now()).then(r=>r.json()).catch(()=>null),
    ])
      .then(([rows,row2])=>{
        if(Array.isArray(rows)) setMovs(rows.map(rowToMov).filter(Boolean));
        if(row2&&(row2.Tk1||row2.Tk2||row2.Tk3)) setInitStock({Tk1:row2.Tk1||0,Tk2:row2.Tk2||0,Tk3:row2.Tk3||0});
        if(row2&&row2.caps) setCaps(row2.caps);
        showToast("✓ Datos Planta Granel cargados","ok");
      })
      .catch(()=>showToast("Sin conexión a Sheets","err",5000))
      .finally(()=>setSyncing(false));
  },[]);

  const sincronizar=()=>{
    setSyncing(true);
    showToast("Sincronizando…","loading",30000);
    gasGet(GAS_URL_PLANTA)
      .then(rows=>{ setMovs(rows.map(rowToMov).filter(Boolean)); showToast("✓ Sincronizado","ok"); })
      .catch(()=>showToast("Error al sincronizar","err",4000))
      .finally(()=>setSyncing(false));
  };

  const ef=()=>({fecha:toDay(),ref:"PS",comp:"",pedido:"",proveedor:"",receptor:"",destino:"",distribucion:{},interno:"",chofer:"",tk1:"",tk2:"",tk3:"",factura:""});
  const [form,setForm]=useState(ef());

  const stocks=useMemo(()=>{
    const st={...initStock};
    movs.forEach(m=>{const sg=["RTO","FAC"].includes(m.ref)?1:-1;TANKS.forEach(tk=>{st[tk]=(st[tk]||0)+sg*(parseFloat(m[tk.toLowerCase()])||0);});});
    return st;
  },[movs,initStock]);
  const stockTotal=TANKS.reduce((a,tk)=>a+(stocks[tk]||0),0);

  const displayed=useMemo(()=>[...movs]
    .filter(m=>!fMes||m.fecha.slice(0,7)===fMes)
    .filter(m=>!fTipo||m.ref===fTipo)
    .filter(m=>{if(!fQ)return true;const q=fQ.toLowerCase();return(m.receptor||"").toLowerCase().includes(q)||(m.proveedor||"").toLowerCase().includes(q)||(m.destino||"").toLowerCase().includes(q)||(m.comp||"").toLowerCase().includes(q);})
    .sort((a,b)=>b.fecha.localeCompare(a.fecha))
  ,[movs,fMes,fTipo,fQ]);

  const mesMovs=useMemo(()=>fMes?movs.filter(m=>m.fecha.slice(0,7)===fMes):movs,[movs,fMes]);
  const litros=tipo=>mesMovs.filter(m=>tipo==="in"?["RTO","FAC"].includes(m.ref):m.ref==="PS").reduce((a,m)=>a+TANKS.reduce((b,tk)=>b+(parseFloat(m[tk.toLowerCase()])||0),0),0);
  const resumen=useMemo(()=>{
    const d={};
    mesMovs.forEach(m=>{const k=m.receptor||m.proveedor||"—";if(!d[k])d[k]={ing:0,eg:0,n:0};const t=TANKS.reduce((a,tk)=>a+(parseFloat(m[tk.toLowerCase()])||0),0);if(["RTO","FAC"].includes(m.ref))d[k].ing+=t;else d[k].eg+=t;d[k].n++;});
    return Object.entries(d).sort((a,b)=>b[1].eg-a[1].eg);
  },[mesMovs]);

  const submit=async()=>{
    if(!form.fecha||(!parseFloat(form.tk1)&&!parseFloat(form.tk2)&&!parseFloat(form.tk3))){
      showToast("Completá la fecha y al menos un tanque con litros.","err"); return;
    }
    const id=editId||String(Date.now());
    // Serializar distribucion como JSON para guardar en sheet (col 18)
    const distStr=Object.keys(form.distribucion||{}).length>0?JSON.stringify(form.distribucion):"";
    const payload={...form,id,tanqueDestino:distStr};
    setMovs(p=>editId?p.map(m=>m.id===id?payload:m):[...p,payload]);
    setEditId(null);setForm(ef());
    try{
      await gasPost(GAS_URL_PLANTA,{action:editId?"update":"add",...payload});
      showToast(editId?"✓ Movimiento actualizado":"✓ Guardado en Google Sheets","ok");
    }catch(e){ showToast("Guardado localmente — verificar conexión","err",4000); }

    // AUTO-SYNC BASE CR: si el receptor/destino es BASE CR y hay litros Euro (Tk2+Tk3)
    const esBaseCR = (payload.receptor||"").toUpperCase().includes("BASE CR") || (payload.destino||"").toUpperCase().includes("BASE CR");
    const litrosEuro = (parseFloat(payload.tk2)||0) + (parseFloat(payload.tk3)||0);
    if(!editId && esBaseCR && litrosEuro > 0){
      try{
        const ingresoBaseCR = {
          action: "add",
          id: String(Date.now()+1),
          fecha: payload.fecha,
          interno: payload.interno||"",
          patente: INTERNO_MAP[payload.interno]||"",
          chofer: payload.chofer||"",
          litros: litrosEuro,  // positivo = ingreso desde Planta a Base CR
          producto: "Euro",
          observaciones: "Ingreso automático desde Planta Granel (N°"+payload.comp+")"
        };
        await gasPost(GAS_URL_BASECR, ingresoBaseCR);
        showToast("✓ Guardado + ingreso automático en Base CR 🚛","ok",4000);
      }catch(e){ showToast("✓ Planta OK — verificar sync Base CR","err",5000); }
    }
  };

  const esI=["RTO","FAC"].includes(form.ref);
  const fTot=(parseFloat(form.tk1)||0)+(parseFloat(form.tk2)||0)+(parseFloat(form.tk3)||0);
  const TABS=[{k:"movs",label:"Movimientos"},{k:"resumen",label:"Resumen"},{k:"config",label:"Configuración"}];

  return(
    <div>
      {/* Mini header de planta */}
      <div style={{display:"flex",gap:20,alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${P.border}`,marginBottom:18,flexWrap:"wrap"}}>
        {TANKS.map(tk=>{
          const pct=caps[tk]>0?Math.min(100,Math.max(0,(stocks[tk]||0)/caps[tk]*100)):0;
          const c=pct>60?"#3de07a":pct>25?"#f0b030":"#f05050";
          return(
            <div key={tk} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{fontSize:9,color:P.inkL,letterSpacing:2,fontFamily:"'Barlow Condensed'",textTransform:"uppercase"}}>{TANK_LABELS[tk]}</div>
              <div style={{width:80,height:4,background:P.bg2,borderRadius:2,margin:"4px 0"}}>
                <div style={{width:`${pct}%`,height:"100%",background:c,borderRadius:2,transition:"width .5s"}}/>
              </div>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:16,fontWeight:700,color:P.ink}}>{fmt(Math.round(stocks[tk]||0))} L</div>
            </div>
          );
        })}
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={sincronizar} disabled={syncing} style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:7,color:P.inkM,fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:11,letterSpacing:2,padding:"8px 14px",cursor:"pointer",opacity:syncing?.6:1}}>
            {syncing?<span className="spin">⟳</span>:"↻"} Sincronizar
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:18,borderBottom:`2px solid ${P.border}`}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{background:"transparent",border:"none",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:12,letterSpacing:2,textTransform:"uppercase",color:tab===t.k?P.accent:P.inkL,padding:"9px 18px 11px",cursor:"pointer",borderBottom:tab===t.k?`2px solid ${P.accent}`:"2px solid transparent",marginBottom:-2}}>{t.label}</button>
        ))}
      </div>

      {tab==="movs"&&(
        <div style={{display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap"}}>
          {/* FORMULARIO */}
          <div style={{width:300,flexShrink:0,background:P.card,border:`1px solid ${P.border}`,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,.08)"}}>
            <div style={{background:esI?"linear-gradient(135deg,#1a4878,#0c2444)":`linear-gradient(135deg,${P.accent},#882c04)`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{esI?"📥":"🚛"}</span>
              <div>
                <div style={{fontFamily:"'Barlow Condensed'",fontWeight:900,fontSize:16,color:"#fff",letterSpacing:1}}>{editId?"EDITAR":"NUEVO"} MOVIMIENTO</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.55)",letterSpacing:1}}>{esI?"INGRESO A TANQUE":"DESPACHO / SALIDA"}</div>
              </div>
            </div>
            <div style={{padding:18,display:"grid",gap:11}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <div><label style={lbl}>Fecha</label><input style={inp} type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
                <div><label style={lbl}>Tipo</label>
                  <select style={inp} value={form.ref} onChange={e=>setForm({...form,ref:e.target.value})}>
                    {TIPOS.map(t=><option key={t.val} value={t.val}>{t.val}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <div><label style={lbl}>Comprobante</label><input style={inp} placeholder="N°" value={form.comp} onChange={e=>setForm({...form,comp:e.target.value})}/></div>
                <div><label style={lbl}>N° Pedido</label><input style={inp} placeholder="—" value={form.pedido} onChange={e=>setForm({...form,pedido:e.target.value})}/></div>
              </div>
              {esI?(
                <div><label style={lbl}>Proveedor</label>
                  <select style={inp} value={form.proveedor} onChange={e=>setForm({...form,proveedor:e.target.value})}>
                    <option value="">— seleccionar —</option>
                    {listas.CLIENTES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              ):(
                <React.Fragment>
                  <div><label style={lbl}>Receptor / Cliente</label>
                    <select style={inp} value={form.receptor} onChange={e=>setForm({...form,receptor:e.target.value})}>
                      <option value="">— seleccionar —</option>
                      {listas.CLIENTES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div><label style={lbl}>Destino</label>
                    <select style={inp} value={form.destino} onChange={e=>setForm({...form,destino:e.target.value,tanqueDestino:DESTINO_TANQUES[e.target.value]?.[0]?.id||"tk1"})}>
                      <option value="">— seleccionar —</option>
                      {listas.DESTINOS.map(d=><option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                  {/* Distribución en tanques destino */}
                  {DESTINO_TANQUES[form.destino]&&(
                    <div style={{background:"#f0faf8",border:`1px solid ${P.teal}`,borderRadius:8,padding:"10px 12px"}}>
                      <div style={{fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.teal,textTransform:"uppercase",marginBottom:8}}>
                        Distribución en tanques destino
                      </div>
                      {DESTINO_TANQUES[form.destino].map(tk=>(
                        <div key={tk.id} style={{display:"grid",gridTemplateColumns:"1fr 90px",gap:8,marginBottom:6,alignItems:"center"}}>
                          <label style={{...lbl,margin:0,color:P.inkM}}>{tk.label}</label>
                          <input
                            style={{...inp,borderColor:(form.distribucion[tk.id]||0)>0?P.teal:P.border,fontWeight:(form.distribucion[tk.id]||0)>0?700:400,textAlign:"right"}}
                            type="number" placeholder="0"
                            value={form.distribucion[tk.id]||""}
                            onChange={e=>{
                              const v=parseFloat(e.target.value)||0;
                              setForm(f=>({...f,distribucion:{...f.distribucion,[tk.id]:v}}));
                            }}
                          />
                        </div>
                      ))}
                      {(()=>{
                        const totalDist=Object.values(form.distribucion).reduce((a,b)=>a+(parseFloat(b)||0),0);
                        const totalTk=(parseFloat(form.tk1)||0)+(parseFloat(form.tk2)||0)+(parseFloat(form.tk3)||0);
                        const diff=totalTk-totalDist;
                        if(totalDist===0) return null;
                        return <div style={{fontFamily:"'Barlow Condensed'",fontSize:12,fontWeight:700,color:Math.abs(diff)<1?P.green:P.accent,textAlign:"right",marginTop:4}}>
                          {Math.abs(diff)<1?"✓ Distribución completa":`Diferencia: ${diff>0?"+":""}${diff.toFixed(0)} L`}
                        </div>;
                      })()}
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                    <div><label style={lbl}>Interno</label>
                      <select style={inp} value={form.interno} onChange={e=>setForm({...form,interno:e.target.value})}>
                        <option value="">—</option>
                        {listas.INTERNOS.map(i=><option key={i} value={i}>{i}</option>)}
                      </select>
                    </div>
                    <div><label style={lbl}>Chofer</label>
                      <select style={inp} value={form.chofer} onChange={e=>setForm({...form,chofer:e.target.value})}>
                        <option value="">—</option>
                        {listas.CHOFERES.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                </React.Fragment>
              )}
              <div style={{background:P.bg,border:`1px solid ${P.border}`,borderRadius:8,padding:"11px 13px"}}>
                <div style={{fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.inkL,textTransform:"uppercase",marginBottom:9}}>Litros por tanque</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {TANKS.map(tk=>(
                    <div key={tk}>
                      <div style={{fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,color:P.accent,letterSpacing:1,marginBottom:4}}>{TANK_LABELS[tk]}</div>
                      <input style={{...inp,borderColor:form[tk.toLowerCase()]?P.accent:P.border,fontWeight:form[tk.toLowerCase()]?600:400}} type="number" placeholder="0" value={form[tk.toLowerCase()]} onChange={e=>setForm({...form,[tk.toLowerCase()]:e.target.value})}/>
                    </div>
                  ))}
                </div>
                {fTot>0&&<div style={{fontFamily:"'Barlow Condensed'",fontSize:13,fontWeight:700,color:esI?P.green:P.accent,textAlign:"right",marginTop:7}}>{esI?"+":"−"}{fmt(fTot)} L</div>}
              </div>
              <div><label style={lbl}>N° Factura</label><input style={inp} placeholder="—" value={form.factura} onChange={e=>setForm({...form,factura:e.target.value})}/></div>
              <div style={{display:"flex",gap:8,paddingTop:2}}>
                <button onClick={submit} style={{flex:1,background:esI?"#1a4878":P.accent,border:"none",borderRadius:7,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:14,letterSpacing:2,padding:"11px 0",cursor:"pointer",textTransform:"uppercase"}}>
                  {editId?"Guardar":"Registrar"}
                </button>
                {editId&&<button onClick={()=>{setEditId(null);setForm(ef());}} style={{background:"transparent",border:`1px solid ${P.border}`,borderRadius:7,color:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:13,padding:"11px 14px",cursor:"pointer"}}>✕</button>}
              </div>
            </div>
          </div>

          {/* TABLA */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"13px 16px",marginBottom:14,display:"flex",gap:11,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div><label style={lbl}>Mes</label><input style={{...inp,width:148}} type="month" value={fMes} onChange={e=>setFMes(e.target.value)}/></div>
              <div><label style={lbl}>Tipo</label>
                <select style={{...inp,width:110}} value={fTipo} onChange={e=>setFTipo(e.target.value)}>
                  <option value="">Todos</option>
                  {TIPOS.map(t=><option key={t.val} value={t.val}>{t.val}</option>)}
                </select>
              </div>
              <div style={{flex:1}}><label style={lbl}>Buscar</label><input style={inp} placeholder="Cliente, proveedor, destino…" value={fQ} onChange={e=>setFQ(e.target.value)}/></div>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:11,color:P.inkL,paddingBottom:9}}>{displayed.length} registros</div>
            </div>
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:P.bg}}>
                      {["Fecha","Tipo","Comp.","Entidad","Destino","Gasoil Tk1","Euro Tk2","Euro Tk3","Total L",""].map(h=>(
                        <th key={h} style={{padding:"9px 13px",textAlign:["Gasoil Tk1","Euro Tk2","Euro Tk3","Total L"].includes(h)?"right":"left",fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.inkL,textTransform:"uppercase",borderBottom:`2px solid ${P.border}`,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {displayed.length===0?(
                      <tr><td colSpan={10} style={{padding:40,textAlign:"center",color:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:13,letterSpacing:2}}>SIN MOVIMIENTOS REGISTRADOS</td></tr>
                    ):displayed.map(m=>{

                          ))}
                          <td style={{padding:"8px 13px",textAlign:"right",fontFamily:"'Barlow Condensed'",fontSize:15,fontWeight:700,color:isIng?P.green:P.accent,whiteSpace:"nowrap"}}>{isIng?"+":"−"}{fmt(tot)}</td>
                          <td style={{padding:"8px 13px"}}>
                            <div style={{display:"flex",gap:4}}>
                              <button className="ba" onClick={()=>{setForm({...m,distribucion:{}});setEditId(m.id);}} style={{background:"#e6f0ff",border:"none",borderRadius:4,color:P.blue,fontSize:12,padding:"4px 9px"}}>✏️</button>
                              <button className="ba" onClick={async()=>{ if(!window.confirm("¿Eliminar?"))return; setMovs(p=>p.filter(x=>x.id!==m.id)); try{await gasPost(GAS_URL_PLANTA,{action:"delete",id:m.id});showToast("✓ Eliminado","ok");}catch(e){} }} style={{background:"#fff0ee",border:"none",borderRadius:4,color:P.red,fontSize:12,padding:"4px 9px"}}>🗑</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==="resumen"&&(
        <div>
          <div style={{display:"flex",gap:11,alignItems:"flex-end",marginBottom:20,flexWrap:"wrap"}}>
            <div><label style={lbl}>Período</label><input style={{...inp,width:158}} type="month" value={fMes} onChange={e=>setFMes(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",gap:12,marginBottom:22,flexWrap:"wrap"}}>
            <Stat label="Ingresos del período" value={Math.round(litros("in"))} color={P.green} idx={0}/>
            <Stat label="Despachos del período" value={Math.round(litros("out"))} color={P.accent} idx={1}/>
            <Stat label="Neto" value={Math.round(litros("in")-litros("out"))} color="#c89020" idx={2}/>
            <Stat label="Movimientos" value={mesMovs.length} unit="" color={P.blue} idx={3}/>
          </div>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 20px",background:P.bg,borderBottom:`1px solid ${P.border}`,fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:11,letterSpacing:3,color:P.inkL,textTransform:"uppercase"}}>Por cliente / proveedor</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:P.bg2}}>
                  {["Entidad","Ingresos (L)","Despachos (L)","Movimientos"].map((h,i)=>(
                    <th key={h} style={{padding:"9px 20px",textAlign:i===0?"left":"right",fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.inkL,textTransform:"uppercase",borderBottom:`1px solid ${P.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {resumen.length===0?(<tr><td colSpan={4} style={{padding:32,textAlign:"center",color:P.inkL,fontFamily:"'Barlow Condensed'"}}>SIN DATOS</td></tr>)
                :resumen.map(([k,d])=>(
                  <tr key={k} className="rh">
                    <td style={{padding:"10px 20px",fontWeight:600,color:P.ink}}>{k}</td>
                    <td style={{padding:"10px 20px",textAlign:"right",color:d.ing>0?P.green:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:15}}>{d.ing>0?`+${fmt(Math.round(d.ing))}`:"—"}</td>
                    <td style={{padding:"10px 20px",textAlign:"right",color:d.eg>0?P.accent:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:15,fontWeight:700}}>{d.eg>0?fmt(Math.round(d.eg)):"—"}</td>
                    <td style={{padding:"10px 20px",textAlign:"right",color:P.inkL}}>{d.n}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="config"&&(
        <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:240,background:P.card,border:`1px solid ${P.border}`,borderRadius:14,overflow:"hidden"}}>
            <div style={{background:"linear-gradient(135deg,#1a4878,#0c2444)",padding:"14px 20px"}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:16,fontWeight:900,color:"#fff",letterSpacing:2}}>STOCK INICIAL</div>
            </div>
            <div style={{padding:20}}>
              {TANKS.map(tk=>(
                <div key={tk} style={{marginBottom:13}}>
                  <label style={{...lbl,color:P.accent}}>{TANK_LABELS[tk]} — Litros</label>
                  <input style={inp} type="number" value={initStock[tk]} onChange={e=>setInitStock(p=>({...p,[tk]:parseFloat(e.target.value)||0}))}/>
                </div>
              ))}
            </div>
          </div>
          <div style={{flex:1,minWidth:240,background:P.card,border:`1px solid ${P.border}`,borderRadius:14,overflow:"hidden"}}>
            <div style={{background:`linear-gradient(135deg,${P.accent},#8a2e04)`,padding:"14px 20px"}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:16,fontWeight:900,color:"#fff",letterSpacing:2}}>CAPACIDAD MÁXIMA</div>
            </div>
            <div style={{padding:20}}>
              {TANKS.map(tk=>(
                <div key={tk} style={{marginBottom:13}}>
                  <label style={{...lbl,color:P.accent}}>{TANK_LABELS[tk]} — Litros</label>
                  <input style={inp} type="number" value={caps[tk]} onChange={e=>setCaps(p=>({...p,[tk]:parseFloat(e.target.value)||0}))}/>
                </div>
              ))}
            </div>
          </div>
          {/* LISTAS DESPLEGABLES */}
          <div style={{width:"100%",background:P.card,border:`1px solid ${P.border}`,borderRadius:14,overflow:"hidden"}}>
            <div style={{background:"linear-gradient(135deg,#2a5c2a,#1a3c1a)",padding:"14px 20px"}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:16,fontWeight:900,color:"#fff",letterSpacing:2}}>LISTAS DESPLEGABLES</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:2}}>Editá clientes, destinos, choferes e internos</div>
            </div>
            <div style={{padding:16,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {Object.entries(listas).map(([key,items])=>(
                <div key={key} style={{background:P.bg,borderRadius:10,padding:12,border:`1px solid ${P.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontFamily:"'Barlow Condensed'",fontSize:13,fontWeight:700,color:P.accent,letterSpacing:1}}>{key}</span>
                    <button onClick={()=>setEditLista({key,draft:items.join("\n")})} style={{background:P.accent,border:"none",borderRadius:5,color:"#fff",fontFamily:"'Barlow Condensed'",fontSize:11,fontWeight:700,padding:"3px 10px",cursor:"pointer",letterSpacing:1}}>EDITAR</button>
                  </div>
                  <div style={{fontSize:11,color:P.inkL,lineHeight:1.9}}>
                    {items.slice(0,5).map(i=><div key={i} style={{borderBottom:`1px solid ${P.border}`,padding:"1px 0"}}>{i}</div>)}
                    {items.length>5&&<div style={{color:P.inkL,fontSize:10,marginTop:3}}>+{items.length-5} más...</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{width:"100%",marginTop:4}}>
            <button onClick={async()=>{
              setSyncing(true);
              await gasPost(GAS_URL_PLANTA,{action:"setConfig",initStock,caps,listas});
              setSyncing(false);
              showToast("✓ Configuración guardada","ok");
            }} style={{width:"100%",background:"linear-gradient(135deg,#1a4878,#0c2444)",border:"none",borderRadius:9,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:15,letterSpacing:2,padding:"13px 0",cursor:"pointer"}}>
              💾 Guardar configuración en Google Sheets
            </button>
          </div>

      )}


      {/* MODAL EDITAR LISTA */}
      {editLista&&(
        <div style={{position:"fixed",inset:0,background:"#00000088",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setEditLista(null);}}>
          <div style={{background:P.card,borderRadius:16,padding:24,width:360,boxShadow:"0 20px 60px #00000055"}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:900,color:P.ink,letterSpacing:2,marginBottom:4}}>{editLista.key}</div>
            <div style={{fontSize:11,color:P.inkL,marginBottom:12}}>Un ítem por línea. Presioná APLICAR y luego GUARDAR CONFIGURACIÓN.</div>
            <textarea value={editLista.draft} onChange={e=>setEditLista(p=>({...p,draft:e.target.value}))}
              style={{width:"100%",height:220,background:P.bg,border:`1px solid ${P.border}`,borderRadius:8,padding:"10px 12px",fontSize:13,fontFamily:"'Barlow Condensed'",color:P.ink,resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>{
                const items=editLista.draft.split("\n").map(s=>s.trim()).filter(Boolean);

                setEditLista(null);
                showToast(`✓ ${editLista.key} actualizado`,"ok");
              }} style={{flex:1,background:P.accent,border:"none",borderRadius:8,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:14,letterSpacing:1,padding:"11px 0",cursor:"pointer"}}>✓ APLICAR</button>
              <button onClick={()=>setEditLista(null)} style={{background:"transparent",border:`1px solid ${P.border}`,borderRadius:8,color:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:14,padding:"11px 16px",cursor:"pointer"}}>✕</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ MÓDULO BASE CR ══════════════════════════════════════════════════════ */
function BaseCR({showToast}){
  const [movs,setMovs]=useState([]);
  const [initStock,setInitStock]=useState(4180);
  const [tab,setTab]=useState("movs");
  const [fMes,setFMes]=useState("");
  const [fQ,setFQ]=useState("");
  const [editId,setEditId]=useState(null);
  const [syncing,setSyncing]=useState(false);

  const efCR=()=>({fecha:toDay(),interno:"",patente:"",chofer:"",litros:"",producto:"Euro",observaciones:""});
  const [form,setForm]=useState(efCR());

  useEffect(()=>{
    if(GAS_URL_BASECR.includes("REEMPLAZAR")) return;
    setSyncing(true);
    gasGet(GAS_URL_BASECR)
      .then(rows=>{ setMovs([]); setTimeout(()=>setMovs(rows.map((r,i)=>rowToMovCR(r,i)).filter(Boolean)),0); showToast("✓ Datos Base CR cargados","ok"); })
      .catch(()=>showToast("Sin conexión a Base CR Sheets","err",5000))
      .finally(()=>setSyncing(false));
  },[]);

  // Auto-completar patente al seleccionar interno
  const handleInterno=(val)=>{
    const patente=INTERNO_MAP[val]||"";
    setForm(f=>({...f,interno:val,patente}));
  };

  const stock=useMemo(()=>{
    return movs.reduce((acc,m)=>{
      const lts=parseFloat(m.litros)||0;
      const esIngreso=(m.observaciones||"").toLowerCase().includes("ingreso");
      return esIngreso ? acc+lts : acc-lts;
    },initStock);
  },[movs,initStock]);

  const displayed=useMemo(()=>[...movs]
    .filter(m=>!fMes||m.fecha.slice(0,7)===fMes)
    .filter(m=>{if(!fQ)return true;const q=fQ.toLowerCase();return(m.interno||"").toLowerCase().includes(q)||(m.patente||"").toLowerCase().includes(q)||(m.chofer||"").toLowerCase().includes(q);})
    .sort((a,b)=>b.fecha.localeCompare(a.fecha))
  ,[movs,fMes,fQ]);

  const submit=async()=>{
    if(!form.fecha||!parseFloat(form.litros)){
      showToast("Completá la fecha y los litros.","err"); return;
    }
    const id=editId||String(Date.now());
    // Serializar distribucion como JSON para guardar en sheet (col 18)
    const distStr=Object.keys(form.distribucion||{}).length>0?JSON.stringify(form.distribucion):"";
    const payload={...form,id,tanqueDestino:distStr};
    setMovs(p=>editId?p.map(m=>m.id===id?payload:m):[...p,payload]);
    setEditId(null);setForm(efCR());
    if(!GAS_URL_BASECR.includes("REEMPLAZAR")){
      try{
        await gasPost(GAS_URL_BASECR,{action:editId?"update":"add",...payload});
        showToast(editId?"✓ Actualizado":"✓ Guardado en Base CR Sheets","ok");
      }catch(e){ showToast("Guardado localmente","err",4000); }
    } else {
      showToast("✓ Guardado localmente (configurar URL de Base CR)","ok");
    }
  };

  const litrosTotales=movs.reduce((a,m)=>{ const esIng=(m.observaciones||"").toLowerCase().includes("ingreso"); return esIng?a:a+(parseFloat(m.litros)||0); },0);
  const mesMovs=useMemo(()=>fMes?movs.filter(m=>m.fecha.slice(0,7)===fMes):movs,[movs,fMes]);
  const litrosMes=mesMovs.reduce((a,m)=>a+(parseFloat(m.litros)||0),0);

  const pct=Math.min(100,Math.max(0,(stock/Math.max(stock+litrosTotales,1))*100));
  const colorStock=pct>60?P.green:pct>25?P.amber:P.red;

  const TABS=[{k:"movs",label:"Cargas"},{k:"resumen",label:"Resumen"}];

  return(
    <div>
      {/* Stock banner */}
      <div style={{background:`linear-gradient(135deg,${P.teal},#054850)`,borderRadius:12,padding:"16px 24px",marginBottom:18,display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:3,color:"rgba(255,255,255,.5)",textTransform:"uppercase",marginBottom:4}}>Stock Euro — Base CR</div>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:40,fontWeight:900,color:"#fff",lineHeight:1}}>{fmt(Math.round(stock))} <span style={{fontSize:14,fontWeight:400,color:"rgba(255,255,255,.6)"}}>litros</span></div>
        </div>
        <div style={{flex:1,minWidth:140}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,.5)",fontFamily:"'Barlow Condensed'",letterSpacing:1}}>INICIAL: {fmt(initStock)} L</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,.5)",fontFamily:"'Barlow Condensed'",letterSpacing:1}}>DESPACHADO: {fmt(Math.round(litrosTotales))} L</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.15)",borderRadius:4}}>
            <div style={{width:`${pct}%`,height:"100%",background:colorStock,borderRadius:4,transition:"width .5s"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!GAS_URL_BASECR.includes("REEMPLAZAR")&&(
            <button onClick={()=>{
              setSyncing(true);
              gasGet(GAS_URL_BASECR)
                .then(rows=>{setMovs([]);setTimeout(()=>setMovs(rows.map((r,i)=>rowToMovCR(r,i)).filter(Boolean)),0);showToast("✓ Sincronizado","ok");})
                .catch(()=>showToast("Error al sincronizar","err",4000))
                .finally(()=>setSyncing(false));
            }} disabled={syncing} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:7,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:11,letterSpacing:2,padding:"8px 14px",cursor:"pointer",opacity:syncing?.6:1}}>
              {syncing?<span className="spin">⟳</span>:"↻"} Sincronizar
            </button>
          )}
        </div>
      </div>

      {/* Aviso si URL no configurada */}
      {GAS_URL_BASECR.includes("REEMPLAZAR")&&(
        <div style={{background:"#fff8e0",border:"1px solid #f0d070",borderRadius:8,padding:"10px 16px",marginBottom:14,fontSize:12,color:"#7a6010",fontFamily:"'Barlow Condensed'",letterSpacing:1}}>
          ⚠️ Configurar URL del script de Base CR en el código (GAS_URL_BASECR) para sincronizar con Google Sheets.
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:18,borderBottom:`2px solid ${P.border}`}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{background:"transparent",border:"none",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:12,letterSpacing:2,textTransform:"uppercase",color:tab===t.k?P.teal:P.inkL,padding:"9px 18px 11px",cursor:"pointer",borderBottom:tab===t.k?`2px solid ${P.teal}`:"2px solid transparent",marginBottom:-2}}>{t.label}</button>
        ))}
      </div>

      {tab==="movs"&&(
        <div style={{display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap"}}>
          {/* FORMULARIO BASE CR */}
          <div style={{width:300,flexShrink:0,background:P.card,border:`1px solid ${P.border}`,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,.08)"}}>
            <div style={{background:`linear-gradient(135deg,${P.teal},#043840)`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>⛽</span>
              <div>
                <div style={{fontFamily:"'Barlow Condensed'",fontWeight:900,fontSize:16,color:"#fff",letterSpacing:1}}>{editId?"EDITAR":"NUEVA"} CARGA</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.55)",letterSpacing:1}}>DESPACHO A VEHÍCULO — EURO</div>
              </div>
            </div>
            <div style={{padding:18,display:"grid",gap:11}}>
              <div><label style={lbl}>Fecha</label><input style={inp} type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>

              {/* Interno con autocompletado de patente */}
              <div>
                <label style={lbl}>Interno</label>
                <select style={inp} value={form.interno} onChange={e=>handleInterno(e.target.value)}>
                  <option value="">— seleccionar —</option>
                  {VEHICULOS.map(v=><option key={v.interno} value={v.interno}>{v.interno}</option>)}
                </select>
              </div>

              {/* Patente - se autocompleta */}
              <div>
                <label style={lbl}>Patente {form.patente&&<span style={{color:P.teal,fontWeight:900}}>↓ auto</span>}</label>
                <input style={{...inp,background:form.patente?"#f0faf8":"#faf7f2",borderColor:form.patente?P.teal:P.border,fontWeight:form.patente?700:400}} value={form.patente} onChange={e=>setForm({...form,patente:e.target.value})} placeholder="se completa automático"/>
              </div>

              <div><label style={lbl}>Chofer</label>
                <select style={inp} value={form.chofer} onChange={e=>setForm({...form,chofer:e.target.value})}>
                  <option value="">— seleccionar —</option>
                  {DEFAULT_LISTAS.CHOFERES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <div>
                  <label style={lbl}>Litros</label>
                  <input style={{...inp,borderColor:form.litros?P.teal:P.border,fontWeight:form.litros?700:400}} type="number" placeholder="0" value={form.litros} onChange={e=>setForm({...form,litros:e.target.value})}/>
                </div>
                <div>
                  <label style={lbl}>Producto</label>
                  <select style={inp} value={form.producto} onChange={e=>setForm({...form,producto:e.target.value})}>
                    <option value="Euro">Euro</option>
                    <option value="Gasoil">Gasoil</option>
                  </select>
                </div>
              </div>

              {form.litros>0&&<div style={{background:"#f0faf8",border:`1px solid ${P.teal}`,borderRadius:6,padding:"8px 12px",fontFamily:"'Barlow Condensed'",fontSize:13,fontWeight:700,color:P.teal,textAlign:"right"}}>−{fmt(parseFloat(form.litros)||0)} L del stock</div>}

              <div><label style={lbl}>Observaciones</label><input style={inp} placeholder="—" value={form.observaciones} onChange={e=>setForm({...form,observaciones:e.target.value})}/></div>

              <div style={{display:"flex",gap:8,paddingTop:2}}>
                <button onClick={submit} style={{flex:1,background:`linear-gradient(135deg,${P.teal},#043840)`,border:"none",borderRadius:7,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:14,letterSpacing:2,padding:"11px 0",cursor:"pointer",textTransform:"uppercase"}}>
                  {editId?"Guardar":"Registrar"}
                </button>
                {editId&&<button onClick={()=>{setEditId(null);setForm(efCR());}} style={{background:"transparent",border:`1px solid ${P.border}`,borderRadius:7,color:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:13,padding:"11px 14px",cursor:"pointer"}}>✕</button>}
              </div>
            </div>
          </div>

          {/* TABLA CARGAS */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"13px 16px",marginBottom:14,display:"flex",gap:11,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div><label style={lbl}>Mes</label><input style={{...inp,width:148}} type="month" value={fMes} onChange={e=>setFMes(e.target.value)}/></div>
              <div style={{flex:1}}><label style={lbl}>Buscar (interno, patente, chofer)</label><input style={inp} placeholder="Buscar…" value={fQ} onChange={e=>setFQ(e.target.value)}/></div>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:11,color:P.inkL,paddingBottom:9}}>{displayed.length} registros</div>
            </div>
            <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:"#f0faf8"}}>
                      {["Fecha","Interno","Patente","Chofer","Litros","Producto","Observaciones",""].map(h=>(
                        <th key={h} style={{padding:"9px 13px",textAlign:h==="Litros"?"right":"left",fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.teal,textTransform:"uppercase",borderBottom:`2px solid ${P.border}`,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {displayed.length===0?(
                      <tr><td colSpan={8} style={{padding:40,textAlign:"center",color:P.inkL,fontFamily:"'Barlow Condensed'",fontSize:13,letterSpacing:2}}>SIN CARGAS REGISTRADAS</td></tr>
                    ):displayed.map(m=>{
                      const lts=parseFloat(m.litros)||0;
                      const esIngreso=(m.observaciones||"").toLowerCase().includes("ingreso");
                      return(
                        <tr key={m.id} className="rh" style={{background:esIngreso?"#f0faf8":"#fff",borderLeft:`3px solid ${esIngreso?P.teal:"transparent"}`}}>
                          <td style={{padding:"8px 13px",color:P.inkL,whiteSpace:"nowrap"}}>{m.fecha}</td>
                          <td style={{padding:"8px 13px",fontFamily:"'Barlow Condensed'",fontWeight:700,color:P.ink}}>{m.interno||"—"}</td>
                          <td style={{padding:"8px 13px",fontFamily:"'Barlow Condensed'",color:P.teal,fontWeight:700}}>{m.patente||"—"}</td>
                          <td style={{padding:"8px 13px",color:P.inkM}}>{m.chofer||"—"}</td>
                          <td style={{padding:"8px 13px",textAlign:"right",fontFamily:"'Barlow Condensed'",fontSize:15,fontWeight:700,color:esIngreso?P.green:P.accent}}>{esIngreso?"+":"−"}{fmt(Math.abs(lts))}</td>
                          <td style={{padding:"8px 13px"}}><span style={{background:"#e8f8f4",color:P.teal,border:`1px solid #b0e0d8`,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:3,fontFamily:"'Barlow Condensed'",letterSpacing:1}}>{m.producto||"Euro"}</span></td>
                          <td style={{padding:"8px 13px",color:P.inkL,fontSize:12}}>{m.observaciones||"—"}</td>
                          <td style={{padding:"8px 13px"}}>
                            <div style={{display:"flex",gap:4}}>
                              <button className="ba" onClick={()=>{setForm({...m,distribucion:{}});setEditId(m.id);}} style={{background:"#e6f0ff",border:"none",borderRadius:4,color:P.blue,fontSize:12,padding:"4px 9px"}}>✏️</button>
                              <button className="ba" onClick={async()=>{ if(!window.confirm("¿Eliminar?"))return; setMovs(p=>p.filter(x=>x.id!==m.id)); if(!GAS_URL_BASECR.includes("REEMPLAZAR")){try{await gasPost(GAS_URL_BASECR,{action:"delete",fecha:m.fecha,litros:m.litros});showToast("✓ Eliminado","ok");}catch(e){}}}} style={{background:"#fff0ee",border:"none",borderRadius:4,color:P.red,fontSize:12,padding:"4px 9px"}}>🗑</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==="resumen"&&(
        <div>
          <div style={{display:"flex",gap:11,alignItems:"flex-end",marginBottom:20,flexWrap:"wrap"}}>
            <div><label style={lbl}>Período</label><input style={{...inp,width:158}} type="month" value={fMes} onChange={e=>setFMes(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",gap:12,marginBottom:22,flexWrap:"wrap"}}>
            <Stat label="Despachado del período" value={Math.round(litrosMes)} color={P.teal} idx={0}/>
            <Stat label="Stock actual" value={Math.round(stock)} color={colorStock} idx={1}/>
            <Stat label="Cargas registradas" value={mesMovs.length} unit="" color={P.blue} idx={2}/>
          </div>
          {/* Resumen por vehículo */}
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 20px",background:"#f0faf8",borderBottom:`1px solid ${P.border}`,fontFamily:"'Barlow Condensed'",fontWeight:700,fontSize:11,letterSpacing:3,color:P.teal,textTransform:"uppercase"}}>Por vehículo</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:P.bg2}}>
                  {["Interno","Patente","Litros cargados","Cargas"].map((h,i)=>(
                    <th key={h} style={{padding:"9px 20px",textAlign:i>1?"right":"left",fontFamily:"'Barlow Condensed'",fontSize:10,fontWeight:700,letterSpacing:2,color:P.inkL,textTransform:"uppercase",borderBottom:`1px solid ${P.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const byVeh={};
                  mesMovs.forEach(m=>{
                    const k=m.interno||"—";
                    if(!byVeh[k])byVeh[k]={patente:m.patente||"—",litros:0,n:0};
                    byVeh[k].litros+=parseFloat(m.litros)||0;
                    byVeh[k].n++;
                  });
                  const rows=Object.entries(byVeh).sort((a,b)=>b[1].litros-a[1].litros);
                  return rows.length===0?<tr><td colSpan={4} style={{padding:32,textAlign:"center",color:P.inkL,fontFamily:"'Barlow Condensed'"}}>SIN DATOS</td></tr>
                  :rows.map(([k,d])=>(
                    <tr key={k} className="rh">
                      <td style={{padding:"10px 20px",fontWeight:700,color:P.ink,fontFamily:"'Barlow Condensed'",fontSize:15}}>{k}</td>
                      <td style={{padding:"10px 20px",color:P.teal,fontWeight:700,fontFamily:"'Barlow Condensed'"}}>{d.patente}</td>
                      <td style={{padding:"10px 20px",textAlign:"right",fontFamily:"'Barlow Condensed'",fontSize:15,fontWeight:700,color:P.accent}}>−{fmt(Math.round(d.litros))}</td>
                      <td style={{padding:"10px 20px",textAlign:"right",color:P.inkL}}>{d.n}</td>
                    </tr>
                  ));
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ APP PRINCIPAL ════════════════════════════════════════════════════════ */
function App(){
  const [planta,setPlanta]=useState("granel"); // "granel" | "basecr"
  const [toast,setToast]=useState({msg:"",type:""});
  const showToast=(msg,type="ok",ms=3000)=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:""}),ms);};

  return(
    <div style={{fontFamily:"'Barlow',sans-serif",background:P.bg,minHeight:"100vh",color:P.ink}}>
      <Toast msg={toast.msg} type={toast.type}/>

      {/* HEADER GLOBAL */}
      <div style={{background:"linear-gradient(135deg,#1c1008,#2e1c08 50%,#3c2810)",borderBottom:`3px solid ${P.accent}`}}>
        <div style={{maxWidth:1440,margin:"0 auto",padding:"0 32px",display:"flex",alignItems:"stretch",flexWrap:"wrap"}}>
          <div style={{display:"flex",flexDirection:"column",justifyContent:"center",padding:"16px 28px 16px 0",borderRight:"1px solid rgba(255,255,255,.08)",marginRight:28}}>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:26,fontWeight:900,color:"#fff",letterSpacing:3,lineHeight:1}}><span style={{color:P.accentL}}>⛽</span> COMBUSTIBLE</div>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:11,fontWeight:600,color:"rgba(255,255,255,.38)",letterSpacing:4,marginTop:3}}>GESTIÓN A GRANEL</div>
          </div>

          {/* SELECTOR DE PLANTA */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 0"}}>
            <button onClick={()=>setPlanta("granel")} style={{
              background:planta==="granel"?P.accent:"rgba(255,255,255,.08)",
              border:`1px solid ${planta==="granel"?P.accent:"rgba(255,255,255,.15)"}`,
              borderRadius:8,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,
              fontSize:13,letterSpacing:2,padding:"9px 20px",cursor:"pointer",
              textTransform:"uppercase",transition:"all .2s"
            }}>
              🏭 Planta Granel
            </button>
            <button onClick={()=>setPlanta("basecr")} style={{
              background:planta==="basecr"?P.teal:"rgba(255,255,255,.08)",
              border:`1px solid ${planta==="basecr"?P.teal:"rgba(255,255,255,.15)"}`,
              borderRadius:8,color:"#fff",fontFamily:"'Barlow Condensed'",fontWeight:700,
              fontSize:13,letterSpacing:2,padding:"9px 20px",cursor:"pointer",
              textTransform:"uppercase",transition:"all .2s"
            }}>
              🚛 Base CR
            </button>
          </div>
        </div>
      </div>

      {/* CONTENIDO */}
      <div style={{padding:"26px 32px",maxWidth:1440,margin:"0 auto"}}>
        {/* Banner de conexión */}
        <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10,fontSize:12,color:P.inkL}}>
          <span style={{fontSize:16}}>🔗</span>
          <span>
            <strong style={{color:P.ink}}>{planta==="granel"?"Planta Granel":"Base CR"}</strong>
            {" — "}
            {planta==="granel"
              ?"Conectado a Google Sheets. Movimientos guardados automáticamente."
              :GAS_URL_BASECR.includes("REEMPLAZAR")
                ?"Configurar la URL del script de Base CR para conectar con Google Sheets."
                :"Conectado a Google Sheets de Base CR. Cargas guardadas automáticamente."
            }
          </span>
        </div>

        {planta==="granel"
          ? <PlantaGranel showToast={showToast}/>
          : <BaseCR showToast={showToast}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
